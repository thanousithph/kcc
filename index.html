function buildNav(role){
  const r=roles[role];
  const nav=document.getElementById('nav');
  nav.innerHTML='<div class="nav-section">ເມນູ</div>'+r.nav.map((n,i)=>`<div class="nav-item${i===0?' active':''}" data-page="${n.page}" onclick="nav('${n.page}',this)"><i class="ti ${n.icon}" aria-hidden="true"></i>${n.label}</div>`).join('');
}

function nav(page,el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el)el.classList.add('active');
  else{const f=document.querySelector(`[data-page="${page}"]`);if(f)f.classList.add('active');}
  const fn=pages[page];
  document.getElementById('mainContent').innerHTML=fn?fn():'<div style="padding:20px;color:var(--color-text-secondary)">ບໍ່ພົບໜ້ານີ້.</div>';
  const curRole=document.getElementById('roleSelect').value;
  const titleMap={};
  roles[curRole].nav.forEach(n=>{titleMap[n.page]=n.label;});
  document.getElementById('pageTitle').textContent=titleMap[page]||page;
  if(document.getElementById('kpiChart')){
    setTimeout(()=>{
      if(window.Chart){

function switchRole(role){
  const r=roles[role];
  document.getElementById('roleTag').textContent=r.tag;
  document.getElementById('roleTag').className='badge '+r.tagClass;
  document.getElementById('pageUser').textContent=r.user;
  document.getElementById('userAvatar').textContent=r.avatar;
  buildNav(role);
  nav(roles[role].nav[0].page,document.querySelector('.nav-item'));
}
